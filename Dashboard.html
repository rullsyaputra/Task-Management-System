<div class="container-fluid h-100">

    <!-- Summary -->

    <div class="summary-grid">

        <div class="summary-card">

            <div class="summary-info">

                <h2 id="todayCount">0</h2>

                <p>Yesterday Activity</p>

            </div>

            <div class="summary-icon">

                <i class="fas fa-calendar-day"></i>

            </div>

        </div>

        <div class="summary-card">

            <div class="summary-info">

                <h2 id="weekCount">0</h2>

                <p>This Week</p>

            </div>

            <div class="summary-icon">

                <i class="fas fa-calendar-week"></i>

            </div>

        </div>

        <div class="summary-card">

            <div class="summary-info">

                <h2 id="monthCount">0</h2>

                <p>This Month</p>

            </div>

            <div class="summary-icon">

                <i class="fas fa-calendar-alt"></i>

            </div>

        </div>

    </div>

    <!-- Recent Activity -->

    <div class="custom-card h-100">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h5 class="mb-0">

                <i class="fas fa-clock-rotate-left text-primary"></i>

                Recent Activity

            </h5>

        </div>

        <div class="table-responsive">

            <table class="table table-hover recent-table mb-0">

                <thead>

                    <tr>

                        <th width="120">Date</th>

                        <th width="180">Project</th>

                        <th>Task</th>

                        <th width="120">Status</th>

                    </tr>

                </thead>

                <tbody id="recentActivity">

                    <tr>

                        <td colspan="4" class="text-center text-muted">

                            Loading...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
